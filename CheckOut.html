<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHECKOUT - LADY BOUTIQUE</title>
    <link rel="stylesheet" href="stylehome.css" />
  </head>

  <body class="checkout-page">
    <div id="navbar-placeholder"></div>

    <header>
      <h1>CheckOut</h1>
    </header>

  

    <form id="main-checkout-form" onsubmit="validateCheckout(event)">
      <div class="ship-container">
        <h2>1. Shipping Info</h2>
        <label class="shipping">Full Name:</label>
        <input
          class="info"
          type="text"
          name="fullname"
          placeholder="Full Name"
          required
        />

        <label class="shipping">Phone Number:</label>
        <input
          class="info"
          type="tel"
          name="phone"
          placeholder="Phone"
          maxlength="11"
          required
        />

        <label class="shipping">Address:</label>
        <input
          class="info"
          type="text"
          name="address"
          placeholder="Address"
          required
        />

        <label class="shipping">City:</label>
        <input
          class="info"
          type="text"
          name="city"
          placeholder="City"
          required
        />
      </div>

      <div class="delivery-container">
        <h2>2. Delivery</h2>
        <div>
          <input
            type="radio"
            name="delivery"
            id="normal"
            value="normal"
            checked
          />
          <label for="normal"
            ><strong>Normal Shipping</strong><br />Delivery in 3–5 days
            ($5.00)</label
          >
        </div>
        <div>
          <input type="radio" name="delivery" id="fast" value="fast" />
          <label for="fast"
            ><strong>Fast Shipping</strong><br />Delivery in 1–2 days
            ($15.00)</label
          >
        </div>
      </div>

      <div class="payment-container">
        <h2>3. Payment</h2>
        <div class="radio-container1">
          <input
            type="radio"
            name="payment"
            id="cash"
            value="cash"
            required
            checked
          />
          <label for="cash">Cash On Delivery</label>
        </div>
        <div class="radio-container2">
          <input type="radio" name="payment" id="credit" value="credit" />
          <label for="credit">Credit Card</label>
        </div>

        <div class="payment-method">
          <label>Card Holder Name:</label>
          <input type="text" name="cardname" placeholder="Card Holder Name" />

          <label>Card Number:</label>
          <input
            type="text"
            name="cardnumber"
            placeholder="0000 0000 0000 0000"
            maxlength="16"
            pattern="[0-9]{16}"
          />

          <label>Expiry Date:</label>
          <input type="month" name="expiry" />

          <label>CVV:</label>
          <input
            type="password"
            name="cvv"
            maxlength="3"
            pattern="[0-9]{3}"
            placeholder="123"
          />
        </div>

        <button type="submit">Place Order</button>
      </div>
    </form>

    <footer>
      <div class="contact">
        <span>connect with LADY BOUTIQE :</span>
        <a href="contactus.html">
          <button class="connect-btn">✉ Contact us</button>
        </a>
      </div>
      <div class="social">
        <a href="#"
          ><img src="img/face icon.jpeg" alt="Facebook" class="social-media"
        /></a>
        <a href="#"
          ><img src="img/insta icon.jpeg" alt="Instagram" class="social-media"
        /></a>
        <a href="#"
          ><img src="img/X-icon.jpeg" alt="Twitter" class="social-media"
        /></a>
        <a href="#"
          ><img
            src="img/WhatsApp icon.jpeg"
            alt="whatsapp"
            class="social-media"
        /></a>
      </div>

      <p>© 2026 Lady Boutique. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
