<!DOCTYPE html>

<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Login</title>

    <link rel="stylesheet" href="login-design.css">

    </head>

        <body class="login-page">

            <header>
                <h1>Welcome Back!</h1>
               
            </header><br>
            <hr><br>

    <div class="login-container">
        
        <h2>Sign in to continue shopping</h2><br><br>
        

        <form>

        <div class="form-group">
            <label>Email Address</label><br>
            <input type="email" id="email" name="email" placeholder="enter email" required><br><br>
         </div>

         <div class="form-group">
            <label>Password</label><br>
            <input type="password" id="password" name="password" placeholder="password" minlength="10" maxlength="16" required><br>
            <br>
        </div>

            <button type="submit">Sign in</button><br><br>
            <input type="checkbox" class="checkmark"><span class="email-news">Email me with news and offers</span><br>

            <p class="terms">By continuing, you agree to our terms of service</p>


        </form>
    </div>
    <footer>
        <p>© 2026 Lady Boutique. All rights reserved.</p>
    </footer>

        </body>
    
</html>
