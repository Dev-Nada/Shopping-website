<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lady Boutique</title>
    
    <link rel="stylesheet" href="stylehome.css">
    <link rel="stylesheet" href="login-design.css">
</head>
<body class="login-page">

    <div id="navbar-placeholder"></div>

    <div class="login-wrapper">
        <div class="login-container">
            
            <h2>Sign in to continue shopping</h2>
            <br>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" minlength="10" maxlength="16" required>
                </div>

                <button type="button" onclick="handleLogin()">Sign in</button>
                
                <div class="checkbox-container">
                    <input type="checkbox" class="checkmark" id="news" checked>
                    <label for="news" class="email-news" style="margin: 0; font-weight: normal;">Email me with news and offers</label>
                </div>

                <p class="terms">By continuing, you agree to our terms of service</p>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 Lady Boutique. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>

    <script>
        function handleLogin() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            if(email === "" || password === "") {
                alert("Please enter both email and password");
                return;
            }
        
            // Check if user exists
            let savedUser = JSON.parse(localStorage.getItem("userAccount"));
            
            if (savedUser && savedUser.email === email && savedUser.password === password) {
                alert("Welcome back!");
                window.location.href = "index.html";
            } else {
                // If they don't exist, let's "register" them for this project's sake
                let confirmRegister = confirm("Account not found. Would you like to create a new account with this email and password?");
                if(confirmRegister) {
                    localStorage.setItem("userAccount", JSON.stringify({email: email, password: password}));
                    alert("Account created successfully!");
                    window.location.href = "index.html";
                }
            }
        }
    </script>
</body>
</html>
